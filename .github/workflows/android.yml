name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from Github UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Clean gradlew line endings and grant permission
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug keystore..."
          tr -d '\r\n' < debug.keystore.base64 | base64 --decode > debug.keystore
        else
          echo "debug.keystore.base64 not found, creating dummy"
          keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -storetype PKCS12 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Set up Environment Variables
      run: |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi

    - name: Setup Gradle (fallback setup)
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: Build with Gradle
      run: |
        if [ -x ./gradlew ] && jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
          echo "Gradle wrapper is healthy. Compiling with gradlew..."
          ./gradlew assembleDebug --no-daemon
        else
          echo "WARNING: gradle-wrapper.jar is missing or corrupt!"
          echo "Falling back to safe runner-installed system Gradle compile to prevent job failure..."
          gradle assembleDebug --no-daemon
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
