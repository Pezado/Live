name: Compilação Automática do APK

on:
  push:
    branches:
      - main # Executa sempre que atualizar a branch principal (mude para "master" se for o nome da sua branch)
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar Código do Repositório
      uses: actions/checkout@v4

    - name: Configurar o Java (JDK 17)
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Dar Permissão de Execução ao Gradle
      run: chmod +x gradlew

    - name: Compilar APK (Modo Depuração / Debug)
      run: ./gradlew assembleDebug

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: aplicativo-bacbo-debug
        path: app/build/outputs/apk/debug/app-debug.apk
